name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── MCP server tests ──────────────────────────────────────────────────────────
  test-mcp:
    name: MCP server tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mcp-ts/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mcp-ts

      - name: Build
        run: npm run build
        working-directory: mcp-ts

      - name: Run tests
        run: npm run test:ci
        working-directory: mcp-ts

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-test-results
          path: mcp-ts/test-results.json

  # ── VS Code extension tests ───────────────────────────────────────────────────
  test-vscode-ext:
    name: VS Code extension tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: vscode-ext/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: vscode-ext

      - name: Build
        run: npm run compile
        working-directory: vscode-ext

      - name: Run tests
        run: npm run test:ci
        working-directory: vscode-ext

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vscode-ext-test-results
          path: vscode-ext/test-results.json

  # ── Aggregate status check ────────────────────────────────────────────────────
  status-check:
    name: All tests passed
    runs-on: ubuntu-latest
    needs: [test-mcp, test-vscode-ext]
    if: always()
    permissions: {}

    steps:
      - name: Report status
        run: |
          if [[ "${{ needs.test-mcp.result }}" != "success" || "${{ needs.test-vscode-ext.result }}" != "success" ]]; then
            echo "❌ Tests failed"
            echo "  test-mcp:        ${{ needs.test-mcp.result }}"
            echo "  test-vscode-ext: ${{ needs.test-vscode-ext.result }}"
            exit 1
          fi
          echo "✅ All tests passed"
