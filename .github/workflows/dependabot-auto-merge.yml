name: Dependabot auto-approve and merge

# PREREQUISITE — branch protection must be configured or auto-merge fires
# immediately even when CI is red. In GitHub repo settings:
#   Settings → Branches → Add rule for "main":
#     ✓ Require status checks to pass before merging
#       Add required check: "Test & template-sync check"   (from ci.yml)
#     ✓ Require branches to be up to date before merging
#
# With those rules in place, "gh pr merge --auto" below only merges once CI
# has passed — it will not merge a failing PR.

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    name: Auto-approve & enable auto-merge
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Verify PR commits are only from Dependabot
        id: verify-commits
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            if (commits.length === 0) {
              core.setFailed('Refusing to auto-approve: PR has no commits.');
              return;
            }

            const invalidCommits = commits.filter((commit) => {
              const authorLogin = commit.author?.login;
              const committerLogin = commit.committer?.login;
              const verification = commit.commit?.verification;
              const isVerified = verification?.verified === true;
              const hasValidReason = verification?.reason === 'valid';

              return (
                authorLogin !== 'dependabot[bot]' ||
                committerLogin !== 'dependabot[bot]' ||
                !isVerified ||
                !hasValidReason
              );
            });

            if (invalidCommits.length > 0) {
              core.setFailed([
                'Refusing to auto-approve: PR contains commits that are not fully verified Dependabot commits.',
                ...invalidCommits.map((commit) => {
                  const sha = commit.sha.slice(0, 7);
                  const author = commit.author?.login ?? 'unknown';
                  const committer = commit.committer?.login ?? 'unknown';
                  const verified = commit.commit?.verification?.verified === true;
                  const reason = commit.commit?.verification?.reason ?? 'unknown';
                  return `- ${sha}: author=${author}, committer=${committer}, verified=${verified}, verification_reason=${reason}`;
                }),
              ].join('\n'));
              return;
            }

            core.info(`Verified ${commits.length} Dependabot-authored commit(s) with valid signature verification.`);

      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
