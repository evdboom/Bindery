name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Job 1: Build .mcpb for Claude Desktop ───────────────────────────────────
  build-mcpb:
    name: Build .mcpb
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build mcp-ts
        run: |
          cd mcp-ts
          npm ci
          npm run compile

      - name: Copy built server into mcpb
        run: |
          mkdir -p mcpb/server
          cp -r mcp-ts/out/. mcpb/server/
          # Include node_modules needed at runtime (minisearch + @modelcontextprotocol/sdk)
          cd mcp-ts
          npm ci --omit=dev
          cp -r node_modules ../mcpb/node_modules

      - name: Set version in manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd mcpb
          jq --arg v "$VERSION" '.version = $v' manifest.json > tmp.json && mv tmp.json manifest.json

      - name: Pack .mcpb
        run: |
          npm install -g @anthropic-ai/mcpb
          cd mcpb
          mcpb pack
          # Ensure consistent filename: bindery-<version>.mcpb
          VERSION=${GITHUB_REF_NAME#v}
          for f in *.mcpb; do
            mv "$f" "bindery-${VERSION}.mcpb" 2>/dev/null || true
          done

      - name: Upload .mcpb to release
        uses: softprops/action-gh-release@v2
        with:
          files: mcpb/*.mcpb
          fail_on_unmatched_files: true

  # ── Job 2: Publish VS Code extension ────────────────────────────────────────
  publish-vscode:
    name: Publish VS Code Extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build mcp-ts (bundled inside extension)
        run: |
          cd mcp-ts
          npm ci
          npm run compile

      - name: Sync templates to vscode-ext
        run: cp mcp-ts/src/templates.ts vscode-ext/src/ai-setup-templates.ts

      - name: Bundle mcp-ts into extension
        run: |
          # mcp-ts/out/ must be inside vscode-ext so vsce picks it up
          mkdir -p vscode-ext/mcp-ts/out
          cp -r mcp-ts/out/. vscode-ext/mcp-ts/out/
          # Install production runtime deps (minisearch) that tools.js requires at runtime
          cd mcp-ts && npm ci --omit=dev
          cp -r node_modules ../vscode-ext/mcp-ts/node_modules

      - name: Set version from tag and publish extension
        # package.json ships with version "0.0.0" — the real version is injected here from the release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd vscode-ext
          npm ci
          npm version "$VERSION" --no-git-tag-version
          npx vsce publish --pat ${{ secrets.VSCODE_EXTENSION_PAT }}
