name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'

jobs:
  # ── Job 0: Validate release tag and expose normalized version ───────────────
  validate-release-version:
    name: Validate Release Version
    runs-on: ubuntu-latest
    permissions: {}
    outputs:
      release_version: ${{ steps.normalize.outputs.release_version }}

    steps:
      - name: Normalize and validate release version
        id: normalize
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Tag '$GITHUB_REF_NAME' does not normalize to a valid semver x.y.z"
            exit 1
          fi
          echo "release_version=$VERSION" >> "$GITHUB_OUTPUT"

  # ── Job 1: Build .mcpb for Claude Desktop ───────────────────────────────────
  build-mcpb:
    name: Build .mcpb
    needs: validate-release-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      RELEASE_VERSION: ${{ needs.validate-release-version.outputs.release_version }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install workspace dependencies
        run: npm ci

      - name: Build bindery-core
        run: npm run build --workspace=bindery-core

      - name: Build mcp-ts
        run: npm run compile --workspace=mcp-ts

      - name: Copy built server into mcpb
        run: |
          mkdir -p mcpb/server
          # Bundle the MCP server into a single runtime file for smaller mcpb payloads.
          npx --yes esbuild@0.28.0 mcp-ts/out/index.js --bundle --platform=node --format=cjs --target=node18 --outfile=mcpb/server/index.js

      - name: Set version in manifest
        run: |
          VERSION="$RELEASE_VERSION"
          cd mcpb
          jq --arg v "$VERSION" '.version = $v' manifest.json > tmp.json && mv tmp.json manifest.json

      - name: Pack .mcpb
        run: |
          npm install -g @anthropic-ai/mcpb
          cd mcpb
          mcpb pack
          # Ensure consistent filename: bindery-<version>.mcpb
          VERSION=$RELEASE_VERSION
          for f in *.mcpb; do
            mv "$f" "bindery-${VERSION}.mcpb" 2>/dev/null || true
          done

      - name: Attest .mcpb build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: mcpb/*.mcpb

      - name: Upload .mcpb to release
        uses: softprops/action-gh-release@v3
        with:
          files: mcpb/*.mcpb
          fail_on_unmatched_files: true

  # ── Job 2: Package VS Code extension + attach VSIX to release ───────────────
  package-vscode:
    name: Package VS Code Extension
    needs: [validate-release-version, build-mcpb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      RELEASE_VERSION: ${{ needs.validate-release-version.outputs.release_version }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install workspace dependencies
        run: npm ci

      - name: Build bindery-core
        run: npm run build --workspace=bindery-core

      - name: Build bindery-merge
        run: npm run build --workspace=bindery-merge

      - name: Build mcp-ts (bundled inside extension)
        run: npm run compile --workspace=mcp-ts

      - name: Bundle mcp-ts into extension
        run: |
          # Bundle mcp-ts runtime entrypoints for extension use.
          # This avoids shipping mcp-ts/node_modules inside the VSIX.
          mkdir -p vscode-ext/mcp-ts/out
          npx --yes esbuild@0.28.0 mcp-ts/out/tools.js --bundle --platform=node --format=cjs --target=node18 --outfile=vscode-ext/mcp-ts/out/tools.js
          npx --yes esbuild@0.28.0 mcp-ts/out/index.js --bundle --platform=node --format=cjs --target=node18 --outfile=vscode-ext/mcp-ts/out/index.js

      - name: Set version from tag and package extension
        # package.json ships with version "0.0.0" — the real version is injected here from the release tag
        run: |
          VERSION="$RELEASE_VERSION"
          cd vscode-ext
          npm version "$VERSION" --no-git-tag-version
          npx --yes @vscode/vsce@3.7.1 package --no-dependencies -o "bindery-${VERSION}.vsix"

      - name: Attest .vsix build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: vscode-ext/*.vsix

      - name: Upload .vsix to release
        uses: softprops/action-gh-release@v3
        with:
          files: vscode-ext/*.vsix
          fail_on_unmatched_files: true

      - name: Upload .vsix as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: vscode-vsix
          path: vscode-ext/*.vsix
          if-no-files-found: error

  # ── Job 3: Build Obsidian plugin + attach zip to release ────────────────────
  package-obsidian:
    name: Package Obsidian Plugin
    needs: [validate-release-version, build-mcpb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      attestations: write
    env:
      RELEASE_VERSION: ${{ needs.validate-release-version.outputs.release_version }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install workspace dependencies
        run: npm ci

      - name: Build bindery-core
        run: npm run build --workspace=bindery-core

      - name: Build bindery-merge
        run: npm run build --workspace=bindery-merge

      - name: Bundle obsidian-plugin
        # esbuild bundles src/main.ts + @bindery/core into a single main.js
        # as required by the Obsidian community plugin format.
        run: npm run bundle --workspace=obsidian-plugin

      - name: Attest main.js build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: obsidian-plugin/out/main.js

      - name: Sync Obsidian manifest metadata from tag
        run: |
          VERSION="$RELEASE_VERSION"
          npm run obsidian:sync-version -- "$VERSION"

      - name: Package Obsidian plugin zip
        # Obsidian community plugins are installed by dropping main.js + manifest.json
        # (+ optional styles.css) into the vault plugins folder. We zip them for the release.
        run: |
          VERSION="$RELEASE_VERSION"
          mkdir -p obsidian-plugin/dist
          cp obsidian-plugin/out/main.js  obsidian-plugin/dist/main.js
          cp obsidian-plugin/manifest.json obsidian-plugin/dist/manifest.json
          cd obsidian-plugin/dist
          zip "../../bindery-obsidian-bundled-${VERSION}.zip" main.js manifest.json

      - name: Upload Obsidian plugin zip to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            bindery-obsidian-bundled-*.zip
            obsidian-plugin/dist/main.js
            obsidian-plugin/dist/manifest.json
          fail_on_unmatched_files: true

      - name: Switch to main for metadata PR
        run: |
          git fetch origin main
          git checkout main
          npm run obsidian:sync-version -- "$RELEASE_VERSION"

      - name: Create PR to sync Obsidian release metadata on main
        continue-on-error: true
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore(obsidian): sync metadata for ${{ github.ref_name }}"
          branch: "chore/obsidian-sync-${{ github.ref_name }}"
          delete-branch: true
          title: "chore(obsidian): sync manifests for ${{ github.ref_name }}"
          body: |
            This automated PR keeps Obsidian plugin metadata in sync with the tagged release.

            Updated files:
            - manifest.json
            - obsidian-plugin/manifest.json
            - obsidian-plugin/versions.json

            Triggered by release tag `${{ github.ref_name }}`.
          base: main
          add-paths: |
            manifest.json
            obsidian-plugin/manifest.json
            obsidian-plugin/versions.json

  # ── Job 4: Publish VSIX to VS Code Marketplace ──────────────────────────────
  publish-vscode:
    name: Publish VS Code Extension
    needs: package-vscode
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download packaged .vsix artifact
        uses: actions/download-artifact@v8
        with:
          name: vscode-vsix
          path: vscode-ext

      - name: Publish extension to Marketplace
        run: |
          VSIX_FILE=$(find vscode-ext -maxdepth 1 -name '*.vsix' -print -quit)
          if [ -z "$VSIX_FILE" ]; then
            echo "No VSIX found in vscode-ext/. Verify download-artifact succeeded and artifact name is 'vscode-vsix'."
            exit 1
          fi
          npx --yes @vscode/vsce@3.7.1 publish --packagePath "$VSIX_FILE" --pat ${{ secrets.VSCODE_EXTENSION_PAT }}
