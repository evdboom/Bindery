name: CI

on:
  pull_request:
    branches: ['**']

permissions:
  contents: read

jobs:
  test:
    name: Test & template-sync check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            mcp-ts/package-lock.json
            vscode-ext/package-lock.json

      # ── MCP server ────────────────────────────────────────────────────────────
      - name: Install mcp-ts dependencies
        run: cd mcp-ts && npm ci

      - name: Compile mcp-ts
        run: cd mcp-ts && npm run compile

      - name: Run mcp-ts tests
        run: cd mcp-ts && npm run test:ci

      - name: Upload mcp-ts test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mcp-test-results-${{ matrix.os }}
          path: mcp-ts/test-results.json

      # ── Template sync ─────────────────────────────────────────────────────────
      # ai-setup-templates.ts is .gitignored — always generated fresh here.
      # The copy-parity test in mcp-ts/test/templates-parity.test.ts then confirms
      # the synced file is byte-for-byte identical to the source.
      - name: Sync templates to vscode-ext
        run: |
          cp mcp-ts/src/templates.ts vscode-ext/src/ai-setup-templates.ts
          echo "Template copy synced."

      # ── VS Code extension ─────────────────────────────────────────────────────
      - name: Install vscode-ext dependencies
        run: cd vscode-ext && npm ci

      - name: Compile vscode-ext
        run: cd vscode-ext && npm run compile

      - name: Run vscode-ext tests
        run: cd vscode-ext && npm run test:ci

      - name: Upload vscode-ext test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vscode-ext-test-results-${{ matrix.os }}
          path: vscode-ext/test-results.json

  # ── Job: Coverage gates ──────────────────────────────────────────────────────
  # Runs coverage-with-thresholds on ubuntu only (one platform is enough — coverage
  # numbers don't depend on OS, and per-OS coverage runs would triple CI time).
  coverage:
    name: Coverage (v8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            mcp-ts/package-lock.json
            vscode-ext/package-lock.json

      - name: Install mcp-ts
        run: cd mcp-ts && npm ci
      - name: Compile mcp-ts
        run: cd mcp-ts && npm run compile
      - name: mcp-ts coverage
        run: cd mcp-ts && npm run test:coverage

      - name: Sync templates to vscode-ext
        run: cp mcp-ts/src/templates.ts vscode-ext/src/ai-setup-templates.ts

      - name: Install vscode-ext
        run: cd vscode-ext && npm ci
      - name: vscode-ext coverage
        run: cd vscode-ext && npm run test:coverage

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            mcp-ts/coverage/
            vscode-ext/coverage/
